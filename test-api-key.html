<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>DeepSeek API Key 测试</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    .result { margin-top: 20px; padding: 16px; border-radius: 8px; white-space: pre-wrap; font-size: 14px; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    button { padding: 10px 24px; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #4338ca; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>🔑 DeepSeek API Key 测试</h1>
  <p>点击下方按钮测试你的 API Key 是否有效：</p>
  <button id="testBtn" onclick="testApiKey()">开始测试</button>
  <div id="result"></div>

  <script>
    async function testApiKey() {
      const btn = document.getElementById('testBtn');
      const resultDiv = document.getElementById('result');
      
      btn.disabled = true;
      btn.textContent = '测试中...';
      resultDiv.innerHTML = '<div class="result info">正在连接 DeepSeek API...</div>';

      const API_KEY = 'sk-e7b5a61d406548548386b9ef8e3374f4';
      const API_URL = 'https://api.deepseek.com/chat/completions';

      try {
        const startTime = Date.now();
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`,
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [{ role: 'user', content: '你好，请用一句话回复我。' }],
          }),
        });

        const elapsed = Date.now() - startTime;
        const data = await response.json();

        if (response.ok) {
          const content = data.choices?.[0]?.message?.content || '(空内容)';
          resultDiv.innerHTML = `<div class="result success">✅ API Key 有效！

状态码: ${response.status}
响应时间: ${elapsed}ms
模型回复: ${content}
Token 使用: ${JSON.stringify(data.usage || {}, null, 2)}</div>`;
        } else {
          resultDiv.innerHTML = `<div class="result error">❌ API 请求失败！

状态码: ${response.status}
错误信息: ${JSON.stringify(data, null, 2)}

可能原因:
- 401: API Key 无效或已过期
- 402: 账户余额不足
- 403: 没有权限
- 429: 请求频率限制
- 500+: DeepSeek 服务器问题</div>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<div class="result error">❌ 网络连接失败！

错误: ${err.message}

可能原因:
- 网络不通（检查是否能访问 api.deepseek.com）
- CORS 被浏览器拦截（查看控制台是否有 CORS 错误）
- 代理/VPN 问题

💡 请打开浏览器开发者工具 (F12) → Console 查看详细错误</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '重新测试';
      }
    }
  </script>
</body>
</html>
