# ============================================
# 潜能星图 - Docker Compose 部署
# ============================================

version: '3.8'

services:
  # ---- MySQL 数据库 ----
  db:
    image: mysql:8.0
    container_name: kiroo-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-kiroo123}
      MYSQL_DATABASE: kiroo_assessment
      MYSQL_CHARSET: utf8mb4
    volumes:
      - db_data:/var/lib/mysql
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Node.js 应用 ----
  app:
    build: .
    container_name: kiroo-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_ROOT_PASSWORD:-kiroo123}
      - DB_NAME=kiroo_assessment
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SMS_ENABLED=false
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
