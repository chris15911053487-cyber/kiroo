# ============================================
# 潜能星图 - Docker Compose 部署
# ============================================

services:
  # ---- Node.js 应用 ----
  app:
    build:
      context: .
      args:
        VITE_LZU_MODE: "false"
    container_name: kiroo-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LZU_MODE=false
      - SMS_ENABLED=false
    volumes:
      - app_data:/app/data

volumes:
  app_data:
